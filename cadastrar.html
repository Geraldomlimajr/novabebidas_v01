<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/logo.png" type="image/x-icon">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Link CDN bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Link CSS-->
    <link rel="stylesheet" href="style.css">
    <title>Cadastrar novo produto</title>
</head>

<body>
    <header class="container-fluid">
        <div class="container text center">
            <div class="row">

                <div class="col">
                    <img src="logo.png" alt="logo" class="img-fluid">
                </div>
                <div class="col d-flex justify-content-start align-items-evenly mt-5">
                    <a href="index.html" class=" d-flex mt-4 text-white fw-semibold fs-5 text-capitalize gap-1">
                    <i class="bi bi-house-door"></i>
                    home
                    </a>
                </div>
                <div class="col">
                    <h1>Cadastrar produto</h1>
                </div>
            </div>
        </div>
    </header>
    <main> <!-- Formulário de cadastro-->
        <div class="container">
            <div class="row">
                <div class="col">
                    <form action="" method="post" class="container-fluid form-edit">
                        <div class="row">
                            <div class="col mb-3">
                                <label for="product" class="form-label fw-bold">Produto:</label>
                                <input type="text" class="form-control" id="product"
                                    placeholder="">
                            </div>
                            <div class="col mb-3">
                                <label for="category" class="form-label fw-bold">Categoria</label>
                                <input type="text" class="form-control" id="category"
                                    placeholder="">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col mb-3">
                                <label for="amount" class="form-label fw-bold">Quantidade</label>
                                <input type="email" class="form-control" id="amount"
                                    placeholder="" >
                            </div>
                            <div class="col mb-3">
                                <label for="cost-price" class="form-label fw-bold">Custo(unidade)</label>
                                <input type="email" class="form-control" id="cost-price"
                                    placeholder="">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="sale-price" class="form-label fw-bold">Preço venda(unidade)</label>
                                <input type="number" class="form-control" id="sale-price"
                                    placeholder="">
                            </div>                            
                        </div>
                            <div class="row">
                            <div class="col m-3 d-flex justify-content-center align-items-center">
                                <button type="button" class="button-register">Cadastrar</button>
                                
                            </div>                            
                        </div>

                    </form>
                </div>
            </div>
    </main>
    <footer> <!-- Rodapé-->
        <div class="container-fluid text-center">
            <div class="row">
                <div class="col d-flex justify-content-center align-items-center p-4">
                    <p class="text-white fw-semibold">
                        Projeto integrador
                    </p>
                </div>
            </div>

        </div>
    </footer>



    <!--Link CDN bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
