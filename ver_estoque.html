<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/logo.png" type="image/x-icon">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Link CDN bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Link CSS-->
    <link rel="stylesheet" href="style.css">

    <title>Ver estoque</title>
</head>

<body>
    <header class="container-fluid">
        <div class="container text center">
            <div class="row">

                <div class="col">
                    <img src="logo.png" alt="logo" class="img-fluid">
                </div>
                <div class="col d-flex justify-content-start align-items-evenly mt-5">
                    <a href="index.html" class=" d-flex mt-4 text-white fw-semibold fs-5 text-capitalize gap-1">
                        <i class="bi bi-house-door"></i>
                        home
                    </a>
                </div>
                <div class="col">
                    <h1>Ver estoque</h1>
                </div>
            </div>
        </div>
    </header>
    <main><!-- Tabela para visualizar o estoque-->
        <div class="container">
            <div class="row">
                <div class="col">
                    <div class="table-responsive" style="max-height: 600px; overflow-y: auto; color:#730202">
                        <table class="table border">
                            <thead>
                                <tr>
                                    <th scope="col" style="color:#730202">Código</th>
                                    <th scope="col" style="color:#730202">Produto</th>
                                    <th scope="col" style="color:#730202">Quantidade</th>
                                    <th scope="col" style="color:#730202">Categoria</th>
                                    <th scope="col" style="color:#730202">Custo(unidade)</th>
                                    <th scope="col" style="color:#730202">Preço venda(unidade)</th>
                                    <th scope="col" style="color:#730202">Ações</th>

                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row" style="color:#730202">001</th>
                                    <td style="color:#730202">Cerveja Skol</td>
                                    <td style="color:#730202">18</td>
                                    <td style="color:#730202">Cervejas</td>
                                    <td style="color:#730202">R$2,30</td>
                                    <td style="color:#730202">R$3,00</td>
                                    <td>
                                        <button class=" btn-edit button-edit-delete" data-modal="btn-edit">
                                            <i class="bi bi-pencil-square"></i>
                                            Editar
                                        </button>
                                        <button class=" btn-delete button-edit-delete" data-modal="btn-delete">
                                            <i class="bi bi-trash"></i>
                                            Excluir
                                        </button>

                                    </td>



                                </tr>
                                <tr>
                                    <th scope="row" style="color:#730202">002</th>
                                    <td style="color:#730202">Vodka</td>
                                    <td style="color:#730202">10</td>
                                    <td style="color:#730202">Destilados</td>
                                    <td style="color:#730202">R$40,00</td>
                                    <td style="color:#730202">R$45,00</td>
                                    <td>
                                        <button class=" btn-edit button-edit-delete" data-modal="btn-edit">
                                            <i class="bi bi-pencil-square"></i>
                                            Editar
                                        </button>
                                        <button class=" btn-delete button-edit-delete" data-modal="btn-delete">
                                            <i class="bi bi-trash"></i>
                                            Excluir
                                        </button>

                                    </td>
                                </tr>





                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

            <!--Modais para editar e excluir-->
            <dialog id="btn-edit" class="modal-edit">

                <div class="col">

                    <form action="" method="post" class="container-fluid text-center">
                        <h3 class="text-center">Editar</h3>
                        <div class="row">
                            <div class="col mb-3">
                                <label for="product" class="form-label fw-bold">Código:</label>
                                <input type="text" class="form-control" id="product" placeholder="" disabled="">
                            </div>

                            <div class="col mb-3">
                                <label for="product" class="form-label fw-bold">Produto:</label>
                                <input type="text" class="form-control" id="product" placeholder="" disabled="">
                            </div>

                        </div>

                        <div class="row">
                            <div class="col mb-3">
                                <label for="category" class="form-label fw-bold">Categoria</label>
                                <input type="text" class="form-control" id="category" placeholder="">
                            </div>
                            <div class="col mb-3">
                                <label for="amount" class="form-label fw-bold">Quantidade</label>
                                <input type="email" class="form-control" id="amount" placeholder="">
                            </div>

                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label for="cost-price" class="form-label fw-bold">Custo(unidade)</label>
                                <input type="email" class="form-control" id="cost-price" placeholder="">
                            </div>
                            <div class="col mb-3">
                                <label for="sale-price" class="form-label fw-bold">Preço venda(unidade)</label>
                                <input type="number" class="form-control" id="sale-price" placeholder="">
                            </div>

                        </div>
                        <div class="row">
                            <div class="col m-3 d-flex justify-content-center align-items-center">
                                <button type="button" class="button-save">Salvar</button>

                            </div>
                            <div class="col m-3 d-flex justify-content-center align-items-center">
                                <button type="button" class="button-cancel close-modal"
                                    data-modal="btn-edit">Cancelar</button>

                            </div>
                        </div>

                    </form>
                </div>

            </dialog>
            <dialog id="btn-delete" class="modal-delete">
                <div class="container">
                    <div class="row">
                        <div class="col">
                            <h3 class="text-center">Excluir</h3>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <p class="fw-semibold">Tem certeza que deseja excluir?</p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col m-3 d-flex justify-content-center align-items-center">
                            <button type="button" class="button-save">Sim</button>

                        </div>
                        <div class="col m-3 d-flex justify-content-center align-items-center">
                            <button type="button" class="button-cancel close-modal"
                                data-modal="btn-delete">Não</button>

                        </div>
                    </div>


                </div>

            </dialog>



    </main>
    <footer>
        <div class="container-fluid text-center">
            <div class="row">
                <div class="col d-flex justify-content-center align-items-center p-4">
                    <p class="text-white fw-semibold">
                        Projeto integrador
                    </p>
                </div>
            </div>

        </div>
    </footer>
    <!--JavaScript-->
    <script src="script.js"></script>



    <!--Link CDN bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
