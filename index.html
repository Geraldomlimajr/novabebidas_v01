<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Link CDN bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Link CSS-->
    <link rel="stylesheet" href="style.css">
    <title>Gerenciador de estoque</title>
</head>

<body class="min-vh-100">
    <header class="container-fluid">
        <div class="container text center">
            <div class="row">

                <div class="col">
                    <img src="logo.png" alt="logo" class="img-fluid">
                </div>
                <div class="col">
                    <h1>Gerenciador de estoque</h1>
                </div>
            </div>

        </div>
    </header>
    <main>
        <!--Conteúdo principal-->
        <div class="container-fluid text-center ">
            <div class="row">
                <!-- Botão Cadastrar-->
                <div class="d-flex col justify-content-center align-items-center">
                    
                        <a class="link-offset-2 link-underline link-underline-opacity-0" href="cadastrar.html">
                            <div class="button d-flex flex-column justify-content-center align-items-center">
                            <p>Cadastrar<br>
                                 novo produto</p>
                            <i class="bi bi-clipboard-plus"></i>
                            
                            </div>
                        </a>
                    
                </div>
                <!-- Botão visualizar estoque-->
                <div class="d-flex col justify-content-center align-items-center">
                    
                        <a class="link-offset-2 link-underline link-underline-opacity-0" href="ver_estoque.html">
                            <div class="button d-flex flex-column justify-content-center align-items-center">
                                <p>Ver<br>
                                 estoque</p>
                                <i class="bi bi-boxes"></i>
                            </div>
                        </a>
                    

                </div>

            </div>

        </div>
    </main>
    <!-- Rodapé-->
 <footer> <!-- Rodapé-->
        <div class="container-fluid text-center">
            <div class="row">
                <div class="col d-flex justify-content-center align-items-center p-4">
                    <p class="text-white fw-semibold">
                        Projeto integrador
                    </p>
                </div>
            </div>

        </div>
    </footer>



    <!--Link CDN bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
